name: PowerShell

on:
    push:
        paths:
            - "powershell/**"
            - ".github/workflows/powershell.yml"
    pull_request:
        paths:
            - "powershell/**"
            - ".github/workflows/powershell.yml"

jobs:
    test:
        name: Test (PowerShell ${{ matrix.ps-version }})
        runs-on: windows-latest
        strategy:
            matrix:
                ps-version: ["5.1", "7.x"]

        steps:
            - uses: actions/checkout@v4

            - name: Set up PowerShell 7 (if needed)
              if: matrix.ps-version == '7.x'
              uses: actions/setup-powershell@v1
              with:
                  powershell-version: ${{ matrix.ps-version }}

            - name: Install Pester
              shell: pwsh
              run: |
                  Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck

            - name: Run Pester tests
              shell: pwsh
              working-directory: powershell
              run: |
                  Invoke-Pester -Path ./tests/ -Output Detailed -PassThru | ForEach-Object {
                    if ($_.FailedCount -gt 0) { exit 1 }
                  }

            - name: Smoke test CLI
              shell: pwsh
              working-directory: powershell
              run: |
                  .\Detect-FileEncoding.ps1 -Folder . -Recursive
