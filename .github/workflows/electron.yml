name: Electron

on:
    push:
        paths:
            - "electron/**"
            - ".github/workflows/electron.yml"
        branches:
            - main
    pull_request:
        paths:
            - "electron/**"
            - ".github/workflows/electron.yml"
    release:
        types: [created]

jobs:
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [windows-latest, macos-latest, ubuntu-latest]

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Install dependencies
              working-directory: electron
              run: npm ci

            - name: Build
              working-directory: electron
              run: npm run build

    release:
        name: Package & Release (${{ matrix.os }})
        if: github.event_name == 'release'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [windows-latest, macos-latest, ubuntu-latest]

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Install dependencies
              working-directory: electron
              run: npm ci

            - name: Package app
              working-directory: electron
              run: npm run package
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload release assets
              uses: softprops/action-gh-release@v2
              with:
                  files: electron/dist/**
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
