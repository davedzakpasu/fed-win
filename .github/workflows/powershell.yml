name: PowerShell

on:
    push:
        paths:
            - "powershell/**"
            - ".github/workflows/powershell.yml"
    pull_request:
        paths:
            - "powershell/**"
            - ".github/workflows/powershell.yml"

jobs:
    test-ps51:
        name: Test (PowerShell 5.1)
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Pester
              shell: powershell
              run: |
                  Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck

            - name: Run Pester tests
              shell: powershell
              working-directory: powershell
              run: |
                  $result = Invoke-Pester -Path ./tests/ -Output Detailed -PassThru
                  if ($result.FailedCount -gt 0) { exit 1 }

            - name: Smoke test CLI
              shell: powershell
              working-directory: powershell
              run: |
                  .\Detect-FileEncoding.ps1 -Folder . -Recursive

    test-ps7:
        name: Test (PowerShell 7)
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4

            - name: Install Pester
              shell: pwsh
              run: |
                  Install-Module -Name Pester -Force -Scope CurrentUser -SkipPublisherCheck

            - name: Run Pester tests
              shell: pwsh
              working-directory: powershell
              run: |
                  $result = Invoke-Pester -Path ./tests/ -Output Detailed -PassThru
                  if ($result.FailedCount -gt 0) { exit 1 }

            - name: Smoke test CLI
              shell: pwsh
              working-directory: powershell
              run: |
                  .\Detect-FileEncoding.ps1 -Folder . -Recursive
